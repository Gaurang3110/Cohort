<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            border: 1px solid black;
            padding: 5px;
        }

        .parent{
            /* by making display flex, aligned on main axis */
            display: flex;   
            height: 250px;
            /* play on main-axis using justify-content */
            justify-content: start;
            /* play on cross-axis */
            align-items: start;

            flex-wrap: wrap;
            /* gap: 20px; */

            /* it will rotate the main and cross axis */
            flex-direction: column;
        }

        .child {
            height: 50px;
            width: 60px;
            /* if make this flex too, can use align items and justify-content */
            display: flex;
            align-items: center;
            justify-content: center;
            flex:1;
        }

        #child-2{
            /* divide in ratios */
            flex:2;
            order: 2;
        }

        #child-4{
            order:5;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">Item 1</div>
        <div id="child-2" class="child">Item 2</div>
        <div class="child">Item 3</div>
        <div id="child-4" class="child">Item 4</div>
        <div class="child">Item 5</div>
        <div class="child">Item 6</div>
        <div class="child">Item 7</div>

    </div>
</body>
</html>
